<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Gastos</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <h2>Mi Dinero</h2>
            <nav>
                <button onclick="mostrarSeccion('dashboard')">Dashboard</button>
                <button onclick="mostrarSeccion('registro')">Registrar</button>
                <button onclick="mostrarSeccion('historial')">Historial</button>
            </nav>
            <button id="theme-toggle">Modo Oscuro</button>
        </aside>

        <main class="main-content">
            <section id="dashboard" class="section active">
                <div class="summary-cards">
                    <div class="card">
                        <h3>Ingresos Totales</h3>
                        <p id="total-ingresos">$0.00</p>
                    </div>
                    <div class="card">
                        <h3>Gastos Totales</h3>
                        <p id="total-gastos">$0.00</p>
                    </div>
                    <div class="card">
                        <h3>Saldo Disponible</h3>
                        <p id="saldo-actual">$0.00</p>
                    </div>
                </div>
                <div class="charts-container">
                    <div class="chart-box"><canvas id="pastelChart"></canvas></div>
                    <div class="chart-box"><canvas id="barrasChart"></canvas></div>
                </div>
            </section>

            <section id="registro" class="section">
                <h2>Registrar Movimiento</h2>
                <form id="registro-form">
                    <label for="tipo">Tipo:</label>
                    <select id="tipo" required>
                        <option value="Gasto">Gasto</option>
                        <option value="Ingreso">Ingreso</option>
                    </select>

                    <label for="monto">Monto:</label>
                    <input type="number" id="monto" step="0.01" required>

                    <label for="categoria">Categoría:</label>
                    <select id="categoria" required>
                        <option value="Transporte">Transporte</option>
                        <option value="Comida">Comida</option>
                        <option value="Escuela">Escuela</option>
                        <option value="Entretenimiento">Entretenimiento</option>
                        <option value="Salud">Salud</option>
                        <option value="Hogar">Hogar</option>
                        <option value="Servicios">Servicios</option>
                        <option value="Ingreso">Ingreso (Salario/Otros)</option>
                        <option value="Otros">Otros</option>
                    </select>

                    <label for="fecha">Fecha:</label>
                    <input type="date" id="fecha" required>

                    <label for="descripcion">Descripción:</label>
                    <input type="text" id="descripcion">

                    <button type="submit">Guardar Registro</button>
                </form>
            </section>

            <section id="historial" class="section">
                <h2>Historial de Movimientos</h2>
                <div class="table-responsive">
                    <table id="tabla-movimientos">
                        <thead>
                            <tr>
                                <th>Fecha</th>
                                <th>Tipo</th>
                                <th>Categoría</th>
                                <th>Descripción</th>
                                <th>Monto</th>
                                <th>Acción</th>
                            </tr>
                        </thead>
                        <tbody>
                            </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
